<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact Us</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/font-awesome.css" />
  <link rel="stylesheet" href="css/bootstrap.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="images/favicon.png" />
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">

    <div class="container">

      <a href="index.html" class="navbar-brand">
        <img src="images/logo.png" alt="Logo" width="225" />
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMenu">

        <ul class="navbar-nav ms-auto align-items-lg-center">

          <li class="nav-item">
            <a href="index.html" class="nav-link fw-semibold">Home</a>
          </li>

          <li class="nav-item">
            <a href="index.html#features" class="nav-link fw-semibold">
              Features
            </a>
          </li>

          <li class="nav-item">
            <a
              href="contact.html"
              class="btn btn-outline-light fw-semibold px-4 ms-lg-4"
            >
              Contact
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- Banner -->
  <header class="header">

    <section class="hero text-white pt-7 pb-4">

      <div class="container-xl">

        <div class="row">

          <div class="col-12">
            <h1>Get In Touch</h1>
          </div>

        </div>

      </div>

    </section>

    <svg
      class="frame-decoration"
      xmlns="http://www.w3.org/2000/svg"
      preserveAspectRatio="none"
      viewBox="0 0 1920 192.275"
    >
      <defs>
        <style>
          .shape-fill {
            fill: #f3f6f9;
          }
        </style>
      </defs>

      <path
        class="shape-fill"
        d="M0,158.755s63.9,52.163,179.472,50.736c121.494-1.5,185.839-49.738,305.984-49.733,109.21,0,181.491,51.733,300.537,50.233,123.941-1.562,225.214-50.126,390.43-50.374,123.821-.185,353.982,58.374,458.976,56.373,217.907-4.153,284.6-57.236,284.6-57.236V351.03H0Z"
      />
    </svg>

  </header>

  <!-- Contact Form -->
  <section class="contact bg-light pb-5">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-10">

          <form action="https://formspree.io/f/mrgvnzvq" method="POST">

            <div class="mb-3">
              <input
                type="text"
                class="form-control form-control-lg"
                name="name"
                placeholder="Full Name"
              />
            </div>

            <div class="mb-3">
              <input
                type="email"
                class="form-control form-control-lg"
                name="email"
                placeholder="Email Address"
              />
            </div>

            <div class="mb-3">
              <textarea
                class="form-control form-control-lg"
                name="message"
                rows="6"
                placeholder="Write your message here..."
              ></textarea>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary text-white mt-2">
                Send Message
              </button>
            </div>

          </form>

        </div>

      </div>

    </div>

  </section>

  <!-- Location -->
  <section class="my-5">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-10">

          <h3>Visit Our Office</h3>

          <p class="mb-4">
            We'd love to hear from you. Reach out with any questions, feedback,
            or partnership inquiries and our team will get back to you as soon
            as possible.
          </p>

          <div class="map">

            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1241.5303553091994!2d-0.14076024298621118!3d51.51210217963597!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x487604d502268421%3A0x6a7d62889992f993!2sRegent+St%2C+Soho%2C+London+W1B+5TH%2C+UK!5e0!3m2!1sen!2sro!4v1476174541049"
              allowfullscreen
            ></iframe>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer class="border-top border-primary bg-dark text-white py-4">

    <div class="container">

      <div class="row">

        <div class="col-md-8">

          <ul class="nav">

            <li class="nav-item">
              <a href="index.html" class="nav-link link-light">Home</a>
            </li>

            <li class="nav-item">
              <a href="index.html#features" class="nav-link link-light">
                Features
              </a>
            </li>

            <li class="nav-item">
              <a href="contact.html" class="nav-link link-light">
                Contact
              </a>
            </li>

          </ul>

        </div>

        <div class="col-md-4">
          <p class="text-end d-none d-md-block">
            Copyright &copy; Blog Launch 2026
          </p>
        </div>

      </div>

    </div>

  </footer>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
